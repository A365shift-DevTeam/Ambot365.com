services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: a365shift_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d a365shift_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=a365shift_db;Username=postgres;Password=${DB_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  email:
    build:
      context: ./Website
      dockerfile: Dockerfile.email
    environment:
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      PORT: 5000
    networks:
      - app_network

  frontend:
    build:
      context: ./Website
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8087:80"
    depends_on:
      - backend
      - email
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
